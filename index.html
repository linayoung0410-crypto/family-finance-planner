<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>家庭三年理财规划</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg:#f0f2f5; --card:#fff; --primary:#4f46e5; --primary-light:#818cf8;
    --success:#22c55e; --warning:#f59e0b; --danger:#ef4444;
    --text:#1e293b; --text2:#64748b; --border:#e2e8f0;
    --shadow:0 1px 3px rgba(0,0,0,.08);
    --radius:12px;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);line-height:1.6;}
  .header{background:linear-gradient(135deg,#4f46e5,#7c3aed);color:#fff;padding:28px 0;text-align:center;}
  .header h1{font-size:26px;font-weight:700;}
  .header p{opacity:.85;margin-top:4px;font-size:14px;}
  .container{max-width:1100px;margin:0 auto;padding:24px 16px 60px;}

  /* Tabs */
  .tabs{display:flex;gap:6px;margin-bottom:24px;flex-wrap:wrap;}
  .tab-btn{padding:10px 22px;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600;background:var(--card);color:var(--text2);box-shadow:var(--shadow);transition:.2s;}
  .tab-btn:hover{color:var(--primary);}
  .tab-btn.active{background:var(--primary);color:#fff;}
  .tab-panel{display:none;}.tab-panel.active{display:block;}

  /* Cards */
  .card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:24px;margin-bottom:20px;}
  .card h2{font-size:17px;margin-bottom:16px;display:flex;align-items:center;gap:8px;}

  /* Summary */
  .summary-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-bottom:24px;}
  .s-card{border-radius:var(--radius);padding:18px 22px;color:#fff;box-shadow:var(--shadow);}
  .s-card .label{font-size:12px;opacity:.9;}
  .s-card .value{font-size:24px;font-weight:700;margin-top:2px;}
  .s-card .sub{font-size:12px;opacity:.8;margin-top:2px;}
  .bg-blue{background:linear-gradient(135deg,#4f46e5,#7c3aed);}
  .bg-green{background:linear-gradient(135deg,#22c55e,#16a34a);}
  .bg-orange{background:linear-gradient(135deg,#f59e0b,#d97706);}
  .bg-red{background:linear-gradient(135deg,#ef4444,#dc2626);}
  .bg-cyan{background:linear-gradient(135deg,#06b6d4,#0891b2);}
  .bg-purple{background:linear-gradient(135deg,#8b5cf6,#7c3aed);}

  /* Form */
  .form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px;}
  .fg{display:flex;flex-direction:column;}
  .fg label{font-size:13px;color:var(--text2);margin-bottom:4px;font-weight:500;}
  .fg input,.fg select{padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:14px;outline:none;transition:.2s;}
  .fg input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(79,70,229,.12);}
  .btn{padding:10px 20px;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:.2s;white-space:nowrap;}
  .btn-primary{background:var(--primary);color:#fff;}.btn-primary:hover{background:#4338ca;}
  .btn-danger{background:var(--danger);color:#fff;font-size:13px;padding:6px 14px;}
  .btn-sm{padding:6px 14px;font-size:13px;}

  /* Table */
  .table-wrap{overflow-x:auto;}
  table{width:100%;border-collapse:collapse;font-size:14px;}
  th{text-align:left;padding:10px 12px;border-bottom:2px solid var(--border);color:var(--text2);font-weight:600;font-size:13px;}
  td{padding:10px 12px;border-bottom:1px solid var(--border);}
  tr:hover{background:#f8fafc;}

  /* Progress */
  .progress{height:12px;background:#e2e8f0;border-radius:99px;overflow:hidden;margin:6px 0;}
  .progress-fill{height:100%;border-radius:99px;transition:width .4s;}
  .pf-green{background:linear-gradient(90deg,#22c55e,#16a34a);}
  .pf-yellow{background:linear-gradient(90deg,#f59e0b,#d97706);}
  .pf-red{background:linear-gradient(90deg,#ef4444,#dc2626);}
  .pf-blue{background:linear-gradient(90deg,#4f46e5,#818cf8);}

  /* Year breakdown */
  .year-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
  .year-card{border:2px solid var(--border);border-radius:var(--radius);padding:20px;text-align:center;transition:.2s;}
  .year-card:hover{border-color:var(--primary-light);}
  .year-card h3{font-size:16px;color:var(--primary);margin-bottom:8px;}
  .year-card .big{font-size:28px;font-weight:700;color:var(--text);}
  .year-card .desc{font-size:13px;color:var(--text2);margin-top:4px;}

  /* Asset */
  .asset-bar{display:flex;height:36px;border-radius:8px;overflow:hidden;margin:8px 0;}
  .asset-bar div{display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:#fff;}

  /* Monthly row */
  .month-row{display:grid;grid-template-columns:60px 1fr 1fr 1fr 1fr 80px;gap:8px;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);font-size:14px;}
  .month-row.header{font-weight:600;color:var(--text2);font-size:13px;border-bottom:2px solid var(--border);}
  .month-input{width:100%;padding:6px 8px;border:1px solid var(--border);border-radius:6px;font-size:13px;text-align:right;outline:none;}
  .month-input:focus{border-color:var(--primary);}
  .positive{color:var(--success);font-weight:600;}
  .negative{color:var(--danger);font-weight:600;}

  .status-tag{display:inline-block;padding:2px 10px;border-radius:99px;font-size:12px;font-weight:600;}
  .tag-good{background:#dcfce7;color:#16a34a;}
  .tag-warn{background:#fef3c7;color:#b45309;}
  .tag-bad{background:#fee2e2;color:#dc2626;}

  .chart-row{display:grid;grid-template-columns:1fr 1fr;gap:20px;}

  .empty-state{text-align:center;padding:30px;color:var(--text2);}
  .mt-12{margin-top:12px;} .mt-16{margin-top:16px;} .mb-8{margin-bottom:8px;}
  .flex-between{display:flex;justify-content:space-between;align-items:center;}
  .text-sm{font-size:13px;color:var(--text2);}
  .text-right{text-align:right;}

  @media(max-width:768px){
    .year-grid{grid-template-columns:1fr;}
    .chart-row{grid-template-columns:1fr;}
    .month-row{grid-template-columns:50px repeat(4,1fr) 60px;font-size:12px;gap:4px;}
    .summary-row{grid-template-columns:1fr 1fr;}
  }
  @media(max-width:480px){
    .summary-row{grid-template-columns:1fr;}
    .month-row{grid-template-columns:40px repeat(4,1fr) 50px;font-size:11px;}
  }
</style>
</head>
<body>

<div class="header">
  <h1>家庭三年理财规划 (2026–2028)</h1>
  <p>目标导向 · 按月追踪 · 科学规划</p>
</div>

<div class="container">

  <!-- Summary Dashboard -->
  <div class="summary-row" id="dashboard"></div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-btn active" data-tab="overview">目标总览</button>
    <button class="tab-btn" data-tab="monthly">每月监控</button>
    <button class="tab-btn" data-tab="charts">可视化分析</button>
    <button class="tab-btn" data-tab="settings">参数设置</button>
  </div>

  <!-- Panel: Overview -->
  <div class="tab-panel active" id="panel-overview">
    <div class="card">
      <h2>📊 当前资产构成</h2>
      <div class="flex-between mb-8">
        <span class="text-sm">总资产</span>
        <span style="font-size:22px;font-weight:700;" id="totalAssetDisplay">¥3,000,000</span>
      </div>
      <div class="asset-bar" id="assetBar"></div>
      <div id="assetLegend" style="display:flex;gap:16px;flex-wrap:wrap;margin-top:8px;font-size:13px;"></div>
    </div>

    <div class="card">
      <h2>🎯 三年目标分解</h2>
      <p class="text-sm mb-8">3 年净储蓄目标区间，按年均分解（可在"参数设置"中调整）</p>
      <div class="year-grid" id="yearGrid"></div>
    </div>

    <div class="card">
      <h2>📈 达标路径预估</h2>
      <p class="text-sm mb-8">基于当前参数，预估 3 年后资产情况</p>
      <div id="projectionSummary"></div>
    </div>
  </div>

  <!-- Panel: Monthly -->
  <div class="tab-panel" id="panel-monthly">
    <div class="card">
      <div class="flex-between mb-8">
        <h2 style="margin:0;">📋 每月收支记录</h2>
        <div>
          <select id="yearSelect" style="padding:6px 12px;border:1px solid var(--border);border-radius:6px;font-size:14px;"></select>
        </div>
      </div>
      <p class="text-sm mb-8">填写每月实际收入和支出，自动计算净储蓄和累计进度</p>
      <div class="month-row header">
        <div>月份</div>
        <div class="text-right">工资收入</div>
        <div class="text-right">投资收益</div>
        <div class="text-right">总支出</div>
        <div class="text-right">净储蓄</div>
        <div>状态</div>
      </div>
      <div id="monthlyRows"></div>
      <div class="flex-between mt-16" style="padding:12px 0;border-top:2px solid var(--border);font-weight:600;">
        <span>年度合计</span>
        <div id="yearlyTotal" style="display:flex;gap:24px;font-size:14px;"></div>
      </div>
    </div>

    <div class="card">
      <h2>🏁 累计储蓄进度</h2>
      <div id="cumulativeProgress"></div>
    </div>
  </div>

  <!-- Panel: Charts -->
  <div class="tab-panel" id="panel-charts">
    <div class="chart-row">
      <div class="card">
        <h2>📈 每月净储蓄趋势</h2>
        <canvas id="chartMonthly"></canvas>
      </div>
      <div class="card">
        <h2>🍩 支出构成</h2>
        <canvas id="chartExpense"></canvas>
      </div>
    </div>
    <div class="card mt-16">
      <h2>📊 累计储蓄 vs 目标轨迹</h2>
      <canvas id="chartCumulative"></canvas>
    </div>
  </div>

  <!-- Panel: Settings -->
  <div class="tab-panel" id="panel-settings">
    <div class="card">
      <h2>⚙️ 基础参数</h2>
      <div class="form-grid">
        <div class="fg">
          <label>3 年储蓄目标（低）</label>
          <input id="setGoalMin" type="number" value="5000000">
        </div>
        <div class="fg">
          <label>3 年储蓄目标（高）</label>
          <input id="setGoalMax" type="number" value="8000000">
        </div>
        <div class="fg">
          <label>起始年份</label>
          <input id="setStartYear" type="number" value="2026">
        </div>
      </div>
    </div>
    <div class="card">
      <h2>💰 当前资产</h2>
      <div class="form-grid">
        <div class="fg">
          <label>股票资产 (元)</label>
          <input id="setStocks" type="number" value="1500000">
        </div>
        <div class="fg">
          <label>理财资产 (元)</label>
          <input id="setFinance" type="number" value="1500000">
        </div>
      </div>
    </div>
    <div class="card">
      <h2>📥 收入假设（月）</h2>
      <div class="form-grid">
        <div class="fg">
          <label>每月固定工资 (元)</label>
          <input id="setSalary" type="number" value="0" placeholder="请填写">
        </div>
        <div class="fg">
          <label>股票预期年化收益率 (%)</label>
          <input id="setStockReturn" type="number" value="8" step="0.1">
        </div>
        <div class="fg">
          <label>理财预期年化收益率 (%)</label>
          <input id="setFinanceReturn" type="number" value="3.5" step="0.1">
        </div>
      </div>
    </div>
    <div class="card">
      <h2>📤 支出假设（月）</h2>
      <div class="form-grid">
        <div class="fg">
          <label>每月固定贷款 (元)</label>
          <input id="setLoan" type="number" value="2650">
        </div>
        <div class="fg">
          <label>每月生活支出 (元)</label>
          <input id="setLiving" type="number" value="0" placeholder="请填写">
        </div>
        <div class="fg">
          <label>每月其他支出 (元)</label>
          <input id="setOther" type="number" value="0">
        </div>
      </div>
    </div>
    <div style="margin-top:16px;display:flex;gap:12px;">
      <button class="btn btn-primary" onclick="applySettings()">保存并更新</button>
      <button class="btn btn-danger" onclick="if(confirm('确定清空所有数据？'))resetAll()">重置全部</button>
    </div>
  </div>
</div>

<script>
const LS = 'family_finance_v2';

function defaults() {
  return {
    goalMin: 5000000, goalMax: 8000000, startYear: 2026,
    stocks: 1500000, finance: 1500000,
    salary: 0, stockReturn: 8, financeReturn: 3.5,
    loan: 2650, living: 0, other: 0,
    monthly: {}
  };
}

let S = load();
function load() { try { return JSON.parse(localStorage.getItem(LS)) || defaults(); } catch { return defaults(); } }
function save() { localStorage.setItem(LS, JSON.stringify(S)); }

/* Helpers */
function fmt(n) {
  const abs = Math.abs(n);
  if (abs >= 10000) return (n < 0 ? '-' : '') + '¥' + (abs / 10000).toFixed(abs >= 100000000 ? 0 : abs >= 1000000 ? 1 : 2) + '万';
  return '¥' + Number(n).toLocaleString('zh-CN', { maximumFractionDigits: 0 });
}
function fmtFull(n) { return '¥' + Number(n).toLocaleString('zh-CN', { maximumFractionDigits: 0 }); }
function pct(v, t) { return t ? (v / t * 100).toFixed(1) : '0'; }

/* Tabs */
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('panel-' + btn.dataset.tab).classList.add('active');
    if (btn.dataset.tab === 'charts') renderCharts();
  });
});

/* Dashboard */
function renderDashboard() {
  const totalAsset = S.stocks + S.finance;
  const goalMid = (S.goalMin + S.goalMax) / 2;
  const monthlyInvReturn = S.stocks * S.stockReturn / 100 / 12 + S.finance * S.financeReturn / 100 / 12;
  const monthlyExpense = S.loan + S.living + S.other;
  const monthlyNet = S.salary + monthlyInvReturn - monthlyExpense;
  const totalSaved = getTotalSaved();

  document.getElementById('dashboard').innerHTML = `
    <div class="s-card bg-blue"><div class="label">当前总资产</div><div class="value">${fmt(totalAsset)}</div><div class="sub">股票 ${fmt(S.stocks)} + 理财 ${fmt(S.finance)}</div></div>
    <div class="s-card bg-green"><div class="label">3年目标区间</div><div class="value">${fmt(S.goalMin)}–${fmt(S.goalMax)}</div><div class="sub">年均 ${fmt(S.goalMin/3)}–${fmt(S.goalMax/3)}</div></div>
    <div class="s-card bg-cyan"><div class="label">预估月净储蓄</div><div class="value">${fmt(monthlyNet)}</div><div class="sub">工资 + 投资收益 - 支出</div></div>
    <div class="s-card bg-orange"><div class="label">已累计净储蓄</div><div class="value">${fmt(totalSaved)}</div><div class="sub">完成 ${pct(totalSaved, goalMid)}%（对中位目标）</div></div>
    <div class="s-card ${totalSaved >= S.goalMin ? 'bg-green' : monthlyNet > 0 ? 'bg-purple' : 'bg-red'}"><div class="label">达标预估</div><div class="value">${monthlyNet > 0 ? Math.ceil((goalMid - totalSaved) / monthlyNet) + ' 个月' : '需调整'}</div><div class="sub">${monthlyNet > 0 ? '预计3年可存 ' + fmt(monthlyNet * 36) : '当前参数下月净储蓄为负'}</div></div>
  `;
}

function getTotalSaved() {
  let total = 0;
  for (let y = S.startYear; y < S.startYear + 3; y++) {
    for (let m = 1; m <= 12; m++) {
      const k = y + '-' + String(m).padStart(2, '0');
      const d = S.monthly[k];
      if (d && d.filled) total += (d.salary + d.invest - d.expense);
    }
  }
  return total;
}

/* Overview */
function renderOverview() {
  const totalAsset = S.stocks + S.finance;
  const stockPct = (S.stocks / totalAsset * 100).toFixed(1);
  const finPct = (S.finance / totalAsset * 100).toFixed(1);

  document.getElementById('totalAssetDisplay').textContent = fmtFull(totalAsset);
  document.getElementById('assetBar').innerHTML = `
    <div style="width:${stockPct}%;background:#ef4444;">股票 ${stockPct}%</div>
    <div style="width:${finPct}%;background:#4f46e5;">理财 ${finPct}%</div>`;
  document.getElementById('assetLegend').innerHTML = `
    <span><span style="display:inline-block;width:12px;height:12px;border-radius:3px;background:#ef4444;margin-right:4px;"></span>股票 ${fmt(S.stocks)}</span>
    <span><span style="display:inline-block;width:12px;height:12px;border-radius:3px;background:#4f46e5;margin-right:4px;"></span>理财 ${fmt(S.finance)}</span>`;

  const yearGrid = document.getElementById('yearGrid');
  const years = [S.startYear, S.startYear + 1, S.startYear + 2];
  yearGrid.innerHTML = years.map((y, i) => {
    const minY = Math.round(S.goalMin / 3);
    const maxY = Math.round(S.goalMax / 3);
    const minM = Math.round(minY / 12);
    const maxM = Math.round(maxY / 12);
    const saved = getYearSaved(y);
    return `<div class="year-card">
      <h3>第 ${i + 1} 年（${y}）</h3>
      <div class="big">${fmt(minY)}–${fmt(maxY)}</div>
      <div class="desc">每月 ${fmt(minM)}–${fmt(maxM)}</div>
      <div class="progress"><div class="progress-fill pf-blue" style="width:${Math.min(pct(saved, minY), 100)}%"></div></div>
      <div class="text-sm">已完成 ${fmt(saved)}（${pct(saved, minY)}%）</div>
    </div>`;
  }).join('');

  renderProjection();
}

function getYearSaved(year) {
  let total = 0;
  for (let m = 1; m <= 12; m++) {
    const k = year + '-' + String(m).padStart(2, '0');
    const d = S.monthly[k];
    if (d && d.filled) total += (d.salary + d.invest - d.expense);
  }
  return total;
}

function renderProjection() {
  const monthlyInv = S.stocks * S.stockReturn / 100 / 12 + S.finance * S.financeReturn / 100 / 12;
  const monthlyExp = S.loan + S.living + S.other;
  const monthlyNet = S.salary + monthlyInv - monthlyExp;
  const proj3y = monthlyNet * 36;

  const hitMin = proj3y >= S.goalMin;
  const hitMax = proj3y >= S.goalMax;

  let html = `<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
    <div><span class="text-sm">月工资收入</span><div style="font-size:18px;font-weight:600;">${fmtFull(S.salary)}</div></div>
    <div><span class="text-sm">月投资收益（预估）</span><div style="font-size:18px;font-weight:600;">${fmtFull(Math.round(monthlyInv))}</div></div>
    <div><span class="text-sm">月总支出</span><div style="font-size:18px;font-weight:600;">${fmtFull(monthlyExp)}</div></div>
    <div><span class="text-sm">月净储蓄</span><div style="font-size:18px;font-weight:600;color:${monthlyNet >= 0 ? 'var(--success)' : 'var(--danger)'};">${fmtFull(Math.round(monthlyNet))}</div></div>
  </div>
  <div style="margin-top:16px;padding:16px;border-radius:8px;background:${hitMin ? '#f0fdf4' : '#fef2f2'};">
    <div style="font-weight:600;font-size:16px;color:${hitMin ? 'var(--success)' : 'var(--danger)'};">
      ${hitMax ? '✅ 预计可达到目标上限' : hitMin ? '✅ 预计可达到目标下限' : '⚠️ 按当前参数无法达到目标下限'}
    </div>
    <div class="text-sm mt-12">3 年预估总储蓄：<b>${fmt(proj3y)}</b>（目标 ${fmt(S.goalMin)}–${fmt(S.goalMax)}）</div>
    ${!hitMin ? '<div class="text-sm mt-12">缺口：<b>' + fmt(S.goalMin - proj3y) + '</b>，需提高月净储蓄至 <b>' + fmt(Math.ceil(S.goalMin / 36)) + '/月</b></div>' : ''}
    ${S.salary === 0 ? '<div class="text-sm mt-12" style="color:var(--warning);">⚠️ 尚未填写月工资，请到"参数设置"中补充</div>' : ''}
  </div>`;

  document.getElementById('projectionSummary').innerHTML = html;
}

/* Monthly */
let currentYear;
function initMonthly() {
  const sel = document.getElementById('yearSelect');
  sel.innerHTML = '';
  for (let y = S.startYear; y < S.startYear + 3; y++) {
    const opt = document.createElement('option');
    opt.value = y; opt.textContent = y + '年';
    sel.appendChild(opt);
  }
  currentYear = S.startYear;
  sel.value = currentYear;
  sel.onchange = () => { currentYear = parseInt(sel.value); renderMonthly(); };
  renderMonthly();
}

function renderMonthly() {
  const wrap = document.getElementById('monthlyRows');
  const monthlyInv = S.stocks * S.stockReturn / 100 / 12 + S.finance * S.financeReturn / 100 / 12;
  const monthlyExp = S.loan + S.living + S.other;

  let html = '';
  let ySalary = 0, yInvest = 0, yExpense = 0, yNet = 0;

  for (let m = 1; m <= 12; m++) {
    const k = currentYear + '-' + String(m).padStart(2, '0');
    const d = S.monthly[k] || { salary: S.salary, invest: Math.round(monthlyInv), expense: monthlyExp, filled: false };

    const net = d.salary + d.invest - d.expense;
    ySalary += d.salary; yInvest += d.invest; yExpense += d.expense; yNet += net;

    const targetMonthly = S.goalMin / 36;
    const cls = net >= targetMonthly ? 'tag-good' : net >= targetMonthly * 0.7 ? 'tag-warn' : 'tag-bad';
    const statusText = net >= targetMonthly ? '达标' : net >= targetMonthly * 0.7 ? '接近' : '落后';

    html += `<div class="month-row">
      <div style="font-weight:600;">${m}月</div>
      <div><input class="month-input" type="number" value="${d.salary}" data-key="${k}" data-field="salary" onchange="updateMonth(this)"></div>
      <div><input class="month-input" type="number" value="${d.invest}" data-key="${k}" data-field="invest" onchange="updateMonth(this)"></div>
      <div><input class="month-input" type="number" value="${d.expense}" data-key="${k}" data-field="expense" onchange="updateMonth(this)"></div>
      <div class="text-right ${net >= 0 ? 'positive' : 'negative'}">${fmtFull(net)}</div>
      <div><span class="status-tag ${cls}">${statusText}</span></div>
    </div>`;
  }
  wrap.innerHTML = html;

  document.getElementById('yearlyTotal').innerHTML = `
    <span>工资 ${fmtFull(ySalary)}</span>
    <span>投资 ${fmtFull(yInvest)}</span>
    <span>支出 ${fmtFull(yExpense)}</span>
    <span class="${yNet >= 0 ? 'positive' : 'negative'}">净存 ${fmtFull(yNet)}</span>`;

  renderCumulative();
}

function updateMonth(el) {
  const k = el.dataset.key;
  const field = el.dataset.field;
  if (!S.monthly[k]) {
    const monthlyInv = S.stocks * S.stockReturn / 100 / 12 + S.finance * S.financeReturn / 100 / 12;
    const monthlyExp = S.loan + S.living + S.other;
    S.monthly[k] = { salary: S.salary, invest: Math.round(monthlyInv), expense: monthlyExp, filled: true };
  }
  S.monthly[k][field] = parseFloat(el.value) || 0;
  S.monthly[k].filled = true;
  save();
  renderMonthly();
  renderDashboard();
  renderOverview();
}

function renderCumulative() {
  let cum = 0;
  const targetMin = S.goalMin;
  const goalMid = (S.goalMin + S.goalMax) / 2;

  let rows = '';
  for (let y = S.startYear; y < S.startYear + 3; y++) {
    let yearNet = 0;
    for (let m = 1; m <= 12; m++) {
      const k = y + '-' + String(m).padStart(2, '0');
      const d = S.monthly[k];
      if (d && d.filled) {
        const net = d.salary + d.invest - d.expense;
        yearNet += net;
      }
    }
    cum += yearNet;
    const p = Math.min(cum / targetMin * 100, 100).toFixed(1);
    const cls = p >= 90 ? 'pf-green' : p >= 50 ? 'pf-yellow' : 'pf-red';
    rows += `<div style="padding:12px 0;border-bottom:1px solid var(--border);">
      <div class="flex-between mb-8"><span style="font-weight:600;">${y} 年</span><span class="text-sm">${fmt(cum)} / ${fmt(targetMin)}（下限）</span></div>
      <div class="progress"><div class="progress-fill ${cls}" style="width:${p}%"></div></div>
    </div>`;
  }

  const totalPct = (cum / targetMin * 100).toFixed(1);
  document.getElementById('cumulativeProgress').innerHTML = rows +
    `<div class="mt-12 text-sm">3年累计净储蓄：<b>${fmt(cum)}</b>，完成下限目标的 <b>${totalPct}%</b></div>`;
}

/* Charts */
let c1, c2, c3;
function renderCharts() {
  if (c1) c1.destroy();
  if (c2) c2.destroy();
  if (c3) c3.destroy();

  const labels = [], netData = [], cumData = [], targetMinData = [], targetMaxData = [];
  let cum = 0;
  const monthlyInv = S.stocks * S.stockReturn / 100 / 12 + S.finance * S.financeReturn / 100 / 12;
  const monthlyExp = S.loan + S.living + S.other;

  for (let y = S.startYear; y < S.startYear + 3; y++) {
    for (let m = 1; m <= 12; m++) {
      const k = y + '-' + String(m).padStart(2, '0');
      labels.push(y + '/' + m);
      const d = S.monthly[k] || { salary: S.salary, invest: Math.round(monthlyInv), expense: monthlyExp };
      const net = d.salary + d.invest - d.expense;
      netData.push(net);
      cum += net;
      cumData.push(cum);
      const idx = (y - S.startYear) * 12 + m;
      targetMinData.push(S.goalMin / 36 * idx);
      targetMaxData.push(S.goalMax / 36 * idx);
    }
  }

  c1 = new Chart(document.getElementById('chartMonthly'), {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        label: '月净储蓄',
        data: netData,
        backgroundColor: netData.map(v => v >= 0 ? '#22c55e' : '#ef4444'),
        borderRadius: 4, maxBarThickness: 24
      }]
    },
    options: { responsive: true, plugins: { legend: { display: false } }, scales: { y: { ticks: { callback: v => fmt(v) } } } }
  });

  const loanTotal = S.loan * 36, livingTotal = S.living * 36, otherTotal = S.other * 36;
  c2 = new Chart(document.getElementById('chartExpense'), {
    type: 'doughnut',
    data: {
      labels: ['贷款', '生活支出', '其他'],
      datasets: [{ data: [loanTotal, livingTotal, otherTotal], backgroundColor: ['#ef4444', '#f59e0b', '#64748b'] }]
    },
    options: { responsive: true, plugins: { legend: { position: 'bottom' } } }
  });

  c3 = new Chart(document.getElementById('chartCumulative'), {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label: '累计储蓄', data: cumData, borderColor: '#4f46e5', backgroundColor: 'rgba(79,70,229,.1)', fill: true, tension: .3, pointRadius: 1 },
        { label: '目标下限', data: targetMinData, borderColor: '#22c55e', borderDash: [6, 3], pointRadius: 0, fill: false },
        { label: '目标上限', data: targetMaxData, borderColor: '#f59e0b', borderDash: [6, 3], pointRadius: 0, fill: false }
      ]
    },
    options: { responsive: true, scales: { y: { ticks: { callback: v => fmt(v) } } }, plugins: { legend: { position: 'bottom' } } }
  });
}

/* Settings */
function applySettings() {
  S.goalMin = parseFloat(document.getElementById('setGoalMin').value) || 5000000;
  S.goalMax = parseFloat(document.getElementById('setGoalMax').value) || 8000000;
  S.startYear = parseInt(document.getElementById('setStartYear').value) || 2026;
  S.stocks = parseFloat(document.getElementById('setStocks').value) || 0;
  S.finance = parseFloat(document.getElementById('setFinance').value) || 0;
  S.salary = parseFloat(document.getElementById('setSalary').value) || 0;
  S.stockReturn = parseFloat(document.getElementById('setStockReturn').value) || 0;
  S.financeReturn = parseFloat(document.getElementById('setFinanceReturn').value) || 0;
  S.loan = parseFloat(document.getElementById('setLoan').value) || 0;
  S.living = parseFloat(document.getElementById('setLiving').value) || 0;
  S.other = parseFloat(document.getElementById('setOther').value) || 0;
  save();
  renderAll();
  alert('参数已保存！');
}

function loadSettings() {
  document.getElementById('setGoalMin').value = S.goalMin;
  document.getElementById('setGoalMax').value = S.goalMax;
  document.getElementById('setStartYear').value = S.startYear;
  document.getElementById('setStocks').value = S.stocks;
  document.getElementById('setFinance').value = S.finance;
  document.getElementById('setSalary').value = S.salary;
  document.getElementById('setStockReturn').value = S.stockReturn;
  document.getElementById('setFinanceReturn').value = S.financeReturn;
  document.getElementById('setLoan').value = S.loan;
  document.getElementById('setLiving').value = S.living;
  document.getElementById('setOther').value = S.other;
}

function resetAll() {
  S = defaults();
  save();
  loadSettings();
  renderAll();
}

/* Init */
function renderAll() {
  renderDashboard();
  renderOverview();
  initMonthly();
}
loadSettings();
renderAll();
</script>
